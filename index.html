<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerraEco: Fronteiras do Amanhã</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #05070a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            color: white;
            flex-direction: column;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #1c2330;
            border-radius: 6px;
            box-shadow: 0px 20px 50px rgba(0,0,0,0.9);
        }
        .instrucoes {
            margin-top: 12px;
            text-align: center;
            font-size: 13px;
            color: #768896;
            line-height: 1.5;
            max-width: 800px;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="500"></canvas>
    
    <div class="instrucoes">
        <strong>Controles (Mundo Expandido):</strong> Mover: <strong>A, D</strong> ou Setas | Pular: <strong>W ou ESPAÇO</strong><br>
        <strong>Manejo:</strong> Pegue água no poço (Extremo Esquerdo). Nos lotes: [J] Orgânico | [K] Químico | [R] Regar | [E] Colher<br>
        <strong>Social e Animais:</strong> Suba na plataforma da Clarice (Extremo Direito) e aperte <strong>[C]</strong>. Perto dos animais, use <strong>[U]</strong>.
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const GRAVIDADE = 0.4;
        const LARGURA_MUNDO = 1600; 
        let tempoAnimacao = 0;
        let cameraX = 0;

        // Jogador Detalhado
        let jogador = { 
            x: 400, y: 300, largura: 30, altura: 50, 
            velX: 0, velY: 0, velocidade: 4, forcaPulo: 10, noChao: false,
            olhandoPara: "direita", andando: false, aguaNoBalde: false
        };
        
        // NPC Clarice
        let npc = { x: 1400, y: 190, largura: 30, altura: 50, nome: "Clarice" };
        
        // Animais da Fazenda com inteligência de caminhada
        let animais = [
            { tipo: "vaca", x: 250, y: 360, largura: 46, height: 40, velX: 0.25, direcao: 1, prontoParaColeta: true, alimentado: true },
            { tipo: "galinha", x: 750, y: 385, largura: 20, height: 16, velX: 0.4, direcao: -1, prontoParaColeta: true, alimentado: true }
        ];

        let chaoY = 400;
        let plataformaNPC = { x: 1330, y: 240, largura: 160, altura: 14 };
        let areaPoco = { x: 60, y: 310, largura: 70, altura: 90 };

        // 3 Lotes de Cultivo no centro do mapa
        let lotes = [
            { id: 1, x: 500, y: 380, largura: 85, altura: 20, estado: 0, progresso: 0, insumo: null },
            { id: 2, x: 680, y: 380, largura: 85, altura: 20, estado: 0, progresso: 0, insumo: null },
            { id: 3, x: 860, y: 380, largura: 85, altura: 20, estado: 0, progresso: 0, insumo: null }
        ];

        let particulasAgua = [];
        let nuvens = [
            {x: 100, y: 50, tam: 80}, {x: 550, y: 80, tam: 110}, 
            {x: 1000, y: 40, tam: 90}, {x: 1400, y: 70, tam: 120}
        ];

        let dinheiro = 100;
        let saudeEcologica = 50;
        let conscientizacao = 0;
        let dialogo = "Clarice: Explore a fazenda! Use o poço à esquerda e traga vida de volta para estas terras.";

        let teclas = {};

        window.addEventListener("keydown", (e) => {
            teclas[e.key.toLowerCase()] = true;
            if (e.key === " " || e.key.toLowerCase() === "w") {
                if (jogador.noChao) { jogador.velY = -jogador.forcaPulo; jogador.noChao = false; }
            }
            verificarInteracao(e.key.toLowerCase());
        });
        
        window.addEventListener("keyup", (e) => { teclas[e.key.toLowerCase()] = false; });

        function checarColisao(objA, objB) {
            let objBLargura = objB.largura || 85;
            let objBAltura = objB.height || objB.altura || 20;
            return (
                objA.x < objB.x + objBLargura &&
                objA.x + objA.largura > objB.x &&
                objA.y < objB.y + objBAltura &&
                objA.y + objA.altura > objB.y
            );
        }

        function verificarInteracao(tecla) {
            // Coleta de Água no Poço
            if (checarColisao(jogador, areaPoco)) {
                if (!jogador.aguaNoBalde) {
                    jogador.aguaNoBalde = true;
                    dialogo = "Balde cheio! Água limpa pronta para irrigar as plantações.";
                }
            }

            // Ações nos Lotes
            lotes.forEach(lote => {
                if (checarColisao(jogador, lote)) {
                    if (tecla === "j" && lote.estado === 0 && dinheiro >= 10) {
                        dinheiro -= 10; lote.estado = 2; lote.insumo = "organico";
                        saudeEcologica = Math.min(100, saudeEcologica + 6);
                        dialogo = `Lote ${lote.id}: Semeado com adubação verde orgânica.`;
                    }
                    else if (tecla === "k" && lote.estado === 0 && dinheiro >= 5) {
                        dinheiro -= 5; lote.estado = 2; lote.insumo = "quimico";
                        saudeEcologica = Math.max(0, saudeEcologica - 14);
                        dialogo = `Lote ${lote.id}: Nitratos químicos injetados no solo.`;
                    }
                    else if (tecla === "r" && lote.estado === 2 && jogador.aguaNoBalde) {
                        lote.estado = 1; jogador.aguaNoBalde = false;
                        dialogo = `Lote ${lote.id}: Cultivo irrigado com sucesso.`;
                    }
                    else if (tecla === "e" && lote.estado === 3) {
                        dinheiro += (lote.insumo === "organico") ? 35 : 50;
                        lote.estado = 0; lote.progresso = 0; lote.insumo = null;
                        dialogo = "Colheita armazenada no silo central!";
                    }
                }
            });

            // Interação com Animais
            if (tecla === "u") {
                animais.forEach(ani => {
                    let hitbox = { x: ani.x, y: ani.y, largura: ani.largura, height: ani.height };
                    if (checarColisao(jogador, hitbox)) {
                        if (saudeEcologica < 30) {
                            dialogo = `Os animais estão apáticos devido à contaminação química do solo.`;
                            return;
                        }
                        if (ani.prontoParaColeta) {
                            dinheiro += (ani.tipo === "vaca") ? 25 : 12;
                            dialogo = `Você vendeu os produtos premium (orgânicos) da ${ani.tipo}!`;
                            ani.prontoParaColeta = false; ani.alimentado = false;
                        } else if (!ani.alimentado) {
                            ani.alimentado = true; ani.prontoParaColeta = true;
                            dialogo = `Você alimentou a ${ani.tipo} com ração limpa de biomassa.`;
                        }
                    }
                });
            }

            // Conversar com Clarice
            if (checarColisao(jogador, npc) && tecla === "c") {
                if (conscientizacao >= 100) {
                    dialogo = "Clarice: Incrível! A fazenda inteira se tornou um modelo sustentável para toda a região.";
                }
                else if (saudeEcologica >= 75) {
                    if (!teclas["c_trava"]) { conscientizacao = Math.min(100, conscientizacao + 25); teclas["c_trava"] = true; }
                    dialogo = "Clarice: Seus animais estão radiantes e o solo está vivo. Vou convencer os outros colonos!";
                } else if (saudeEcologica < 30) {
                    dialogo = "Clarice: Eu não posso apoiar um projeto que envenena o lençol freático da nossa vila.";
                } else {
                    dialogo = "Clarice: Mostre-me que consegue gerenciar múltiplos lotes de forma verde e consistente.";
                }
            }
        }

        function atualizar() {
            // Movimentação do Jogador
            jogador.velX = 0; jogador.andando = false;
            if (teclas["a"] || teclas["arrowleft"]) { jogador.velX = -jogador.velocidade; jogador.olhandoPara = "esquerda"; jogador.andando = true; }
            if (teclas["d"] || teclas["arrowright"]) { jogador.velX = jogador.velocidade; jogador.olhandoPara = "direita"; jogador.andando = true; }

            jogador.x += jogador.velX; jogador.velY += GRAVIDADE; jogador.y += jogador.velY;

            // Colisões do Jogador (Chão e Plataforma)
            if (jogador.y + playerAltura() >= chaoY) { jogador.y = chaoY - playerAltura(); jogador.velY = 0; jogador.noChao = true; }
            if (jogador.velY > 0 && jogador.x + jogador.largura > plataformaNPC.x && jogador.x < plataformaNPC.x + plataformaNPC.largura && jogador.y + playerAltura() >= plataformaNPC.y && jogador.y + playerAltura() - jogador.velY <= plataformaNPC.y) { 
                jogador.y = plataformaNPC.y - playerAltura(); jogador.velY = 0; jogador.noChao = true; 
            }
            jogador.x = Math.max(0, Math.min(LARGURA_MUNDO - jogador.largura, jogador.x));

            if (!checarColisao(jogador, npc)) teclas["c_trava"] = false;

            // Câmera Segue Jogador
            cameraX = jogador.x - canvas.width / 2 + jogador.largura / 2;
            cameraX = Math.max(0, Math.min(LARGURA_MUNDO - canvas.width, cameraX));

            // Crescimento das Plantas
            lotes.forEach(lote => { if (lote.estado === 1) { lote.progresso += 0.3; if (lote.progresso >= 100) lote.estado = 3; } });

            // IA dos Animais
            animais.forEach(ani => {
                if (saudeEcologica >= 30) {
                    ani.x += ani.velX * ani.direcao;
                    if (ani.x < 150 || ani.x > 1150) ani.direcao *= -1;
                }
            });

            tempoAnimacao += 0.05;

            // Nuvens flutuantes
            nuvens.forEach(n => { n.x -= 0.15; if(n.x < -150) n.x = LARGURA_MUNDO + 50; });

            // Bolhas do Poço
            if (Math.random() < 0.1) { particulasAgua.push({ x: areaPoco.x + 18 + Math.random() * 34, y: areaPoco.y + 70, raio: 1 + Math.random() * 1.5, velY: 0.2 + Math.random() * 0.4 }); }
            for (let i = particulasAgua.length - 1; i >= 0; i--) { particulasAgua[i].y -= particulasAgua[i].velY; if (particulasAgua[i].y < areaPoco.y + 50) particulasAgua.splice(i, 1); }
        }

        function playerAltura() { return jogador.altura; }

        // --- RENDERIZAÇÃO GRÁFICA DETALHADA ---

        function desenharPersonagemDetalhado(ctx, x, y, corCamisa, corCabelo, olhandoPara, andando, eJogador) {
            let oscilacaoY = andando ? Math.sin(tempoAnimacao * 2.5) * 2 : 0;
            let balancoPerna = andando ? Math.sin(tempoAnimacao * 2.5) * 4 : 0;

            ctx.save();
            ctx.translate(x - cameraX, y + oscilacaoY);

            // Pernas e Botas
            ctx.fillStyle = "#1a222d"; 
            ctx.fillRect(3 + balancoPerna, 42, 9, 8); 
            ctx.fillRect(17 - balancoPerna, 42, 9, 8); 
            ctx.fillStyle = "#2c3e50"; 
            ctx.fillRect(4, 30, 22, 12); 

            // Tronco
            ctx.fillStyle = corCamisa; ctx.fillRect(3, 14, 24, 16); 
            ctx.fillStyle = "rgba(0,0,0,0.15)"; ctx.fillRect(3, 26, 24, 4); 

            // Braços
            ctx.fillStyle = corCamisa;
            if (olhandoPara === "direita") {
                ctx.fillRect(andando ? 2 : -1, 15, 5, 14); 
                ctx.fillStyle = "#ffcc99"; ctx.fillRect(andando ? 2 : -1, 29, 5, 4);
            } else {
                ctx.fillRect(24, 15, 5, 14);
                ctx.fillStyle = "#ffcc99"; ctx.fillRect(24, 29, 5, 4);
            }

            // Rosto e Olhos que piscam
            ctx.fillStyle = "#ffcc99"; ctx.fillRect(5, 4, 20, 11); 
            ctx.fillStyle = "#333"; 
            let olhoX = olhandoPara === "direita" ? 19 : 7;
            if (Math.floor(tempoAnimacao) % 5 !== 0) {
                ctx.fillRect(olhoX, 8, 3, 4);
                ctx.fillRect(olhoX + (olhandoPara === "direita" ? -5 : 5), 8, 3, 4);
            }

            // Cabelo e Chapéus diferenciados
            ctx.fillStyle = corCabelo; ctx.fillRect(4, 0, 22, 5); 
            if (olhandoPara === "direita") { ctx.fillRect(4, 4, 5, 8); } else { ctx.fillRect(21, 4, 5, 8); }

            if (eJogador) {
                ctx.fillStyle = "#f39c12"; ctx.fillRect(-2, -1, 34, 4); 
                ctx.fillStyle = "#d35400"; ctx.fillRect(5, -6, 20, 6); 
                ctx.fillStyle = "#c0392b"; ctx.fillRect(5, -2, 20, 2); 
            } else {
                ctx.fillStyle = "#9b59b6"; ctx.fillRect(4, -2, 22, 3);
            }

            // Balde na mão
            if (eJogador && jogador.aguaNoBalde) {
                let bx = olhandoPara === "direita" ? 26 : -10;
                ctx.fillStyle = "#7f8c8d"; ctx.fillRect(bx, 22, 12, 12);
                ctx.fillStyle = "#3498db"; ctx.fillRect(bx + 2, 22, 8, 3); 
            }

            ctx.restore();
        }

        function desenharAnimaisDetalhados() {
            animais.forEach(ani => {
                ctx.save();
                ctx.translate(ani.x - cameraX, ani.y);
                let orelhaMexe = Math.sin(tempoAnimacao) * 2;

                if (ani.tipo === "vaca") {
                    ctx.fillStyle = (saudeEcologica < 30) ? "#6b7280" : "#ffffff";
                    ctx.fillRect(0, 10, ani.largura, 22); 
                    if (saudeEcologica >= 30) {
                        ctx.fillStyle = "#111827"; ctx.fillRect(6, 12, 14, 10); ctx.fillRect(26, 16, 12, 12);
                    }
                    ctx.fillStyle = "#374151";
                    ctx.fillRect(4, 32, 6, 10); ctx.fillRect(14, 32, 6, 10);
                    ctx.fillRect(26, 32, 6, 10); ctx.fillRect(36, 32, 6, 10);
                    
                    ctx.fillStyle = (saudeEcologica < 30) ? "#4b5563" : "#f3f4f6";
                    let hx = ani.direcao === 1 ? ani.largura - 4 : -12;
                    ctx.fillRect(hx, 2, 16, 16);
                    ctx.fillStyle = "#fca5a5"; ctx.fillRect(hx + (ani.direcao === 1 ? 8 : -2), 8, 10, 10); 
                    ctx.fillStyle = "#1f2937"; ctx.fillRect(hx + 3, -2 + orelhaMexe, 4, 5); 

                    if (ani.prontoParaColeta && saudeEcologica >= 30) {
                        ctx.fillStyle = "#ffffff"; ctx.fillRect(12, -20, 20, 16);
                        ctx.fillStyle = "#2563eb"; ctx.font = "11px Arial"; ctx.fillText("🥛", 16, -8);
                    }
                } else if (ani.tipo === "galinha") {
                    ctx.fillStyle = (saudeEcologica < 30) ? "#4b5563" : "#f59e0b";
                    ctx.fillRect(0, 4, ani.largura, 12); 
                    ctx.fillStyle = (saudeEcologica < 30) ? "#374151" : "#fbbf24";
                    let gx = ani.direcao === 1 ? ani.largura - 8 : 0;
                    ctx.fillRect(gx, -4, 8, 9); 
                    ctx.fillStyle = "#dc2626"; ctx.fillRect(gx + (ani.direcao === 1 ? 2 : 0), -7, 5, 4); 

                    if (ani.prontoParaColeta && saudeEcologica >= 30) {
                        ctx.fillStyle = "#ffffff"; ctx.fillRect(2, -20, 18, 15);
                        ctx.fillStyle = "#b45309"; ctx.font = "11px Arial"; ctx.fillText("🥚", 5, -8);
                    }
                }
                ctx.restore();
            });
        }

        function desenharCenarioExpandido() {
            let grad = ctx.createLinearGradient(0, 0, 0, chaoY);
            if (saudeEcologica < 30) { grad.addColorStop(0, "#27272a"); grad.addColorStop(1, "#52525b"); }
            else { grad.addColorStop(0, "#1e1b4b"); grad.addColorStop(0.4, "#2563eb"); grad.addColorStop(1, "#93c5fd"); }
            ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = (saudeEcologica < 30) ? "rgba(71,85,105,0.4)" : "rgba(255,255,255,0.4)";
            nuvens.forEach(n => {
                ctx.beginPath(); ctx.arc(n.x - cameraX, n.y, n.tam/2, 0, Math.PI*2); ctx.fill();
            });

            ctx.fillStyle = (saudeEcologica < 30) ? "#3f3f46" : "#15803d";
            ctx.beginPath(); ctx.moveTo(0, chaoY); ctx.lineTo(400 - cameraX, 220); ctx.lineTo(900 - cameraX, chaoY); ctx.fill(); 

            // Silo Central
            ctx.fillStyle = "#4b5563"; ctx.fillRect(1150 - cameraX, chaoY - 210, 70, 210);
            ctx.fillStyle = "#9ca3af"; ctx.beginPath(); ctx.arc(1185 - cameraX, chaoY - 210, 35, Math.PI, 0); ctx.fill();

            // Cerca Decorativa
            ctx.fillStyle = "#451a03";
            for(let cx = 150; cx < 1250; cx += 40) {
                ctx.fillRect(cx - cameraX, chaoY - 24, 5, 24);
                ctx.fillRect(cx - cameraX, chaoY - 18, 40, 4);
            }

            // Estrutura do Poço
            ctx.fillStyle = "#374151"; ctx.fillRect(areaPoco.x - cameraX, areaPoco.y + 45, areaPoco.largura, 45); 
            ctx.fillStyle = "#1f2937"; ctx.fillRect(areaPoco.x + 10 - cameraX, areaPoco.y + 55, areaPoco.largura - 20, 30); 
            ctx.fillStyle = (saudeEcologica < 30) ? "#3f4e2c" : "#0284c7"; ctx.fillRect(areaPoco.x + 12 - cameraX, areaPoco.y + 65, areaPoco.largura - 24, 20); 
            ctx.fillStyle = "#78350f"; ctx.fillRect(areaPoco.x + 10 - cameraX, areaPoco.y, 8, 45); ctx.fillRect(areaPoco.x + areaPoco.largura - 18 - cameraX, areaPoco.y, 8, 45); 
            ctx.fillStyle = "#9f1239"; ctx.fillRect(areaPoco.x - 6 - cameraX, areaPoco.y - 6, areaPoco.largura + 12, 12); 

            // Bolhas
            ctx.fillStyle = "rgba(255,255,255,0.4)";
            particulasAgua.forEach(b => { ctx.beginPath(); ctx.arc(b.x - cameraX, b.y, b.raio, 0, Math.PI*2); ctx.fill(); });

            // Solo e Grama
            ctx.fillStyle = "#271c11"; ctx.fillRect(0, chaoY, canvas.width, canvas.height - chaoY);
            ctx.fillStyle = (saudeEcologica < 30) ? "#715a2c" : "#166534"; ctx.fillRect(0, chaoY, canvas.width, 14); 

            // Montanha/Plataforma da Clarice
            ctx.fillStyle = "#78350f"; ctx.fillRect(plataformaNPC.x + 20 - cameraX, plataformaNPC.y, 10, chaoY - plataformaNPC.y);
            ctx.fillRect(plataformaNPC.x + plataformaNPC.largura - 30 - cameraX, plataformaNPC.y, 10, chaoY - plataformaNPC.y);
            ctx.fillStyle = "#b45309"; ctx.fillRect(plataformaNPC.x - cameraX, plataformaNPC.y, plataformaNPC.largura, plataformaNPC.altura);
        }

        function desenharLotesSombreados() {
            lotes.forEach(lote => {
                ctx.fillStyle = (lote.estado === 1) ? "#1f1105" : "#3b2314";
                ctx.fillRect(lote.x - cameraX, lote.y, lote.largura, lote.altura);

                ctx.fillStyle = "#78350f"; ctx.fillRect(lote.x + lote.largura/2 - 2 - cameraX, lote.y + lote.altura, 4, 12);
                ctx.fillStyle = "#ea580c"; ctx.fillRect(lote.x + lote.largura/2 - 10 - cameraX, lote.y + lote.altura + 4, 20, 11);
                ctx.fillStyle = "white"; ctx.font = "bold 10px Arial"; ctx.fillText(lote.id, lote.x + lote.largura/2 - 3 - cameraX, lote.y + lote.altura + 13);

                let cX = lote.x + lote.largura / 2 - cameraX;
                let cY = lote.y;

                if (lote.estado === 1 || lote.estado === 2) {
                    ctx.fillStyle = "#4ade80"; ctx.fillRect(cX - 3, cY - 14, 6, 14); 
                    ctx.fillStyle = "#22c55e"; ctx.fillRect(cX - 8, cY - 12, 5, 4);
                } else if (lote.estado === 3) {
                    ctx.fillStyle = "#15803d"; ctx.fillRect(cX - 15, cY - 16, 30, 16); 
                    if (lote.insumo === "organico") {
                        ctx.fillStyle = "#fbbf24"; ctx.beginPath(); ctx.arc(cX, cY - 20, 10, 0, Math.PI*2); ctx.fill(); 
                    } else {
                        ctx.fillStyle = "#ef4444"; ctx.fillRect(cX - 14, cY - 28, 28, 14); 
                    }
                }
            });
        }

        function desenharHUDModerna() {
            ctx.fillStyle = "rgba(15,23,42,0.9)"; ctx.strokeStyle = "#334155"; ctx.lineWidth = 3;
            ctx.fillRect(20, 20, 380, 115); ctx.strokeRect(20, 20, 380, 115);

            ctx.fillStyle = "#fbbf24"; ctx.font = "bold 12px 'Courier New'";
            ctx.fillText(`● ORÇAMENTO DISPONÍVEL: $${dinheiro}`, 35, 48);

            ctx.fillStyle = "#ffffff";
            ctx.fillText(`EQUILÍBRIO DO VALE:   ${saudeEcologica}%`, 35, 75);
            ctx.fillStyle = "#1e293b"; ctx.fillRect(235, 65, 140, 12);
            ctx.fillStyle = (saudeEcologica < 30) ? "#ef4444" : "#22c55e"; ctx.fillRect(235, 65, 1.4 * saudeEcologica, 12);

            ctx.fillText(`CONSCIENTIZAÇÃO VILA: ${conscientizacao}%`, 35, 102);
            ctx.fillStyle = "#1e293b"; ctx.fillRect(235, 92, 140, 12);
            ctx.fillStyle = "#3b82f6"; ctx.fillRect(235, 92, 1.4 * conscientizacao, 12);

            ctx.fillStyle = "rgba(15,23,42,0.95)"; ctx.strokeStyle = "#475569"; ctx.lineWidth = 2;
            ctx.fillRect(20, 425, canvas.width - 40, 55); ctx.strokeRect(20, 425, canvas.width - 40, 55);
            ctx.fillStyle = "#f8fafc"; ctx.font = "14px Arial"; ctx.fillText(dialogo, 40, 458);
        }

        function desenhar() {
            desenharCenarioExpandido();
            desenharLotesSombreados();
            desenharAnimaisDetalhados();

            desenharPersonagemDetalhado(ctx, jogador.x, jogador.y, "#ef4444", "#451a03", jogador.olhandoPara, jogador.andando, true);
            desenharPersonagemDetalhado(ctx, npc.x, npc.y, "#8b5cf6", "#f59e0b", "esquerda", false, false);

            desenharHUDModerna();

            if (conscientizacao >= 100) {
                ctx.fillStyle = "rgba(9, 17, 14, 0.96)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = "#22c55e"; ctx.strokeRect(20, 20, canvas.width - 40, canvas.height - 40);
                ctx.fillStyle = "#22c55e"; ctx.font = "bold 22px 'Courier New'";
                ctx.fillText("ECOVALE REGENERADO E CONSCIENTE!", canvas.width/2 - 210, canvas.height/2 - 15);
                ctx.fillStyle = "#cbd5e1"; ctx.font = "14px Arial";
                ctx.fillText("Parabéns! Através da implantação da câmera livre, manejo agroecológico expandido", canvas.width/2 - 270, canvas.height/2 + 20);
                ctx.fillText("e proteção da fauna, você reeducou a Clarice e uniu toda a colônia pelo futuro.", canvas.width/2 - 275, canvas.height/2 + 45);
            }
        }

        function loop() {
            if (conscientizacao < 100) atualizar();
            desenhar();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
