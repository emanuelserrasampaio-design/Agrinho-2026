<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerraEco: Crônicas do Vale Vivo [Ultimate Edition]</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #010204;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #f1f5f9;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }
        canvas {
            border: 4px solid #334155;
            border-radius: 12px;
            box-shadow: 0px 30px 70px rgba(0,0,0,0.95);
            background-color: #000;
        }
        .instrucoes {
            margin-top: 14px;
            text-align: center;
            font-size: 13px;
            color: #94a3b8;
            line-height: 1.6;
            max-width: 900px;
            background: #0f172a;
            padding: 12px 24px;
            border-radius: 8px;
            border: 1px solid #1e293b;
        }
        span.key {
            background: #475569;
            color: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
            font-size: 11px;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="960" height="540"></canvas>
    
    <div class="instrucoes">
        <strong>Controles Absolutos:</strong> Andar: <span class="key">A, D</span> / Setas | Pular: <span class="key">W</span> / <span class="key">ESPAÇO</span><br>
        <strong>Manejo de Solo:</strong> Poço (Esquerda) dá água. Lotes: <span class="key">J</span> Orgânico (-$10) | <span class="key">K</span> Químico (-$5) | <span class="key">R</span> Regar | <span class="key">E</span> Colher<br>
        <strong>Facilitadores de Missão:</strong> Falar/Chamar Clarice no Rádio: <span class="key">C</span> (Funciona de qualquer lugar!) | Teletransporte para Clarice: <span class="key">T</span> | Menu: <span class="key">I</span>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Motores de Física
        const GRAVIDADE = 0.44;
        const LARGURA_MUNDO = 2000; 
        let tempoAnimacao = 0;
        let cameraX = 0;
        
        // Ciclo de Tempo Ajustado
        let horaMundo = 6.0; 
        let estrelas = [];
        for(let i=0; i<80; i++) estrelas.push({x: Math.random() * LARGURA_MUNDO, y: Math.random() * 260, brilho: Math.random(), tam: 1 + Math.random()*2});

        // Entidades Principais
        let jogador = { 
            x: 500, y: 300, largura: 32, altura: 54, 
            velX: 0, velY: 0, velocidade: 4.8, forcaPulo: 11.0, noChao: false,
            olhandoPara: "direita", andando: false, aguaNoBalde: false,
            upgrades: { irrigacao: false, superSemente: false, bioRacao: false }
        };
        
        // Área física expandida da Clarice para facilitar o contato (largura aumentada de 32 para 150)
        let npc = { x: 1800, y: 190, largura: 150, altura: 54, nome: "Clarice" };
        
        let animais = [
            { tipo: "vaca", x: 350, y: 360, largura: 52, height: 42, velX: 0.35, direcao: 1, prontoParaColeta: true, alimentado: true, estado: "pastando", timer: 120 },
            { tipo: "galinha", x: 850, y: 384, largura: 22, height: 16, velX: 0.6, direcao: -1, prontoParaColeta: true, alimentado: true, estado: "bicando", timer: 60 },
            { tipo: "ovelha", x: 1200, y: 365, largura: 42, height: 36, velX: 0.4, direcao: 1, prontoParaColeta: true, alimentado: true, estado: "andando", timer: 90 }
        ];

        const chaoY = 430;
        let plataformaNPC = { x: 1720, y: 244, largura: 190, height: 16 };
        let areaPoco = { x: 90, y: 340, largura: 80, height: 90 };
        let areaSilo = { x: 1450, y: 220, largura: 100, height: 210 };

        // Lotes Sistêmicos de Cultivo
        let lotes = [
            { id: 1, x: 550, y: 410, largura: 95, altura: 20, estado: 0, progresso: 0, insumo: null },
            { id: 2, x: 770, y: 410, largura: 95, altura: 20, estado: 0, progresso: 0, insumo: null },
            { id: 3, x: 990, y: 410, largura: 95, altura: 20, estado: 0, progresso: 0, insumo: null },
            { id: 4, x: 1210, y: 410, largura: 95, altura: 20, estado: 0, progresso: 0, insumo: null }
        ];

        let particulas = [];
        let borboletas = [];
        let menuUpgradesAberto = false;

        // Variáveis Sociais, Econômicas e Ambientais
        let dinheiro = 150;
        let saudeEcologica = 50; 
        let conscientizacao = 0;
        let idMissaoAtual = 1; 
        let dialogo = "Guia: Aperte [C] em qualquer lugar para acionar o Rádio e falar com a Clarice!";

        let teclas = {};

        for (let i = 0; i < 9; i++) {
            borboletas.push({ x: Math.random() * LARGURA_MUNDO, y: 100 + Math.random() * 180, angulo: Math.random() * Math.PI * 2, cor: `hsl(${Math.random() * 360}, 90%, 65%)` });
        }

        window.addEventListener("keydown", (e) => {
            let k = e.key.toLowerCase();
            teclas[k] = true;
            if ((e.key === " " || k === "w") && jogador.noChao && !menuUpgradesAberto) {
                jogador.velY = -jogador.forcaPulo;
                jogador.noChao = false;
                emitirParticulas(jogador.x + 16, jogador.y + 52, "#64748b", 8, "poeira");
            }
            if (k === "i") { menuUpgradesAberto = !menuUpgradesAberto; }
            if (!menuUpgradesAberto) processarInteracoes(k);
        });
        window.addEventListener("keyup", (e) => { teclas[e.key.toLowerCase()] = false; });

        function checarColisao(objA, objB) {
            let bW = objB.largura || objB.width || 95;
            let bH = objB.height || objB.altura || 20;
            return (
                objA.x < objB.x + bW &&
                objA.x + objA.largura > objB.x &&
                objA.y < objB.y + bH &&
                objA.y + objA.altura > objB.y
            );
        }

        function emitirParticulas(x, y, cor, qtd, tipo = "efeito") {
            for(let i=0; i<qtd; i++) {
                particulas.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * (tipo === "folha" ? 1.5 : 4),
                    vy: tipo === "folha" ? 1 + Math.random() : (Math.random() - 0.5) * 4 - 2,
                    vida: 1.0, cor: cor, tipo: tipo,
                    tam: tipo === "texto" ? 12 : 2 + Math.random() * 4,
                    texto: tipo === "texto" ? cor : "" 
                });
            }
        }

        function processarInteracoes(tecla) {
            // Teletransporte Facilitador para a Clarice
            if (tecla === "t") {
                jogador.x = npc.x - 40;
                jogador.y = plataformaNPC.y - jogador.altura;
                jogador.velY = 0;
                jogador.noChao = true;
                dialogo = "Teletransporte realizado com sucesso até a Clarice!";
                emitirParticulas(jogador.x + 16, jogador.y + 20, "#a855f7", 20);
            }

            // Poço de Captação Hídrica
            if (checarColisao(jogador, areaPoco)) {
                if (!jogador.aguaNoBalde) {
                    jogador.aguaNoBalde = true;
                    dialogo = "Balde preenchido com água filtrada.";
                    emitirParticulas(areaPoco.x + 40, areaPoco.y + 60, "#0ea5e9", 15, "splash");
                }
            }

            // Manejo de Solo nos Lotes
            lotes.forEach(lote => {
                if (checarColisao(jogador, lote)) {
                    if (tecla === "j" && lote.estado === 0 && dinheiro >= 10) {
                        dinheiro -= 10; lote.estado = jogador.upgrades.irrigacao ? 1 : 2; 
                        lote.insumo = "organico";
                        saudeEcologica = Math.min(100, saudeEcologica + 3);
                        dialogo = `Lote ${lote.id}: Semeado organicamente.`;
                        emitirParticulas(lote.x + 47, lote.y, "#22c55e", 10);
                    }
                    else if (tecla === "k" && lote.estado === 0 && dinheiro >= 5) {
                        dinheiro -= 5; lote.estado = jogador.upgrades.irrigacao ? 1 : 2; 
                        lote.insumo = "quimico";
                        saudeEcologica = Math.max(0, saudeEcologica - 5);
                        dialogo = `Lote ${lote.id}: Agroquímicos injetados.`;
                        emitirParticulas(lote.x + 47, lote.y, "#d8b4fe", 10);
                    }
                    else if (tecla === "r" && lote.estado === 2 && jogador.aguaNoBalde) {
                        lote.estado = 1; jogador.aguaNoBalde = false;
                        dialogo = `Lote ${lote.id}: Solo umectado.`;
                        emitirParticulas(lote.x + 47, lote.y, "#38bdf8", 20, "splash");
                    }
                    else if (tecla === "e" && lote.estado === 3) {
                        let baseLucro = (lote.insumo === "organico") ? 40 : 50;
                        if(jogador.upgrades.superSemente) baseLucro = Math.floor(baseLucro * 1.4);
                        dinheiro += baseLucro;
                        dialogo = `Mercadoria coletada! +$${baseLucro} adicionados.`;
                        emitirParticulas(lote.x + 47, lote.y - 12, lote.insumo === "organico" ? "#f59e0b" : "#ef4444", 18);
                        emitirParticulas(lote.x + 47, lote.y - 30, `+$${baseLucro}`, 1, "texto");
                        lote.estado = 0; lote.progresso = 0; lote.insumo = null;
                    }
                }
            });

            // Manejo Animal
            if (tecla === "u") {
                animais.forEach(ani => {
                    if (checarColisao(jogador, { x: ani.x, y: ani.y, largura: ani.largura, height: ani.height })) {
                        if (saudeEcologica < 20) {
                            dialogo = "A criatura está fraca devido à poluição.";
                            return;
                        }
                        if (ani.prontoParaColeta) {
                            let bônus = jogador.upgrades.bioRacao ? 1.5 : 1.0;
                            let lucroAnimal = Math.floor((ani.tipo === "vaca" ? 35 : ani.tipo === "ovelha" ? 28 : 18) * bônus);
                            dinheiro += lucroAnimal;
                            dialogo = `Recursos coletados do(a) ${ani.tipo}.`;
                            ani.prontoParaColeta = false; ani.alimentado = false;
                            emitirParticulas(ani.x + ani.largura/2, ani.y + 15, "#ffffff", 12);
                            emitirParticulas(ani.x + ani.largura/2, ani.y - 15, `+$${lucroAnimal}`, 1, "texto");
                        } else if (!ani.alimentado) {
                            ani.alimentado = true; ani.prontoParaColeta = true;
                            dialogo = `Você alimentou o animal com ração saudável.`;
                            emitirParticulas(ani.x + ani.largura/2, ani.y + 15, "#fef08a", 10);
                        }
                    }
                });
            }

            // SISTEMA DE RÁDIO COM A CLARICE (Aperte C em qualquer parte do mapa)
            if (tecla === "c") {
                if (saudeEcologica < 25) {
                    dialogo = "Clarice (Rádio): Pare de poluir o Vale Vivo! Use plantios orgânicos [J] para recuperar a natureza!";
                    return;
                }

                if (idMissaoAtual === 1) {
                    if (saudeEcologica >= 70) {
                        idMissaoAtual = 2;
                        conscientizacao = 35;
                        dinheiro += 60;
                        dialogo = "Clarice (Rádio): Ótimo! Você bateu a meta de 70% de Saúde! Ganhou +$60. Próxima meta: 82%!";
                        emitirParticulas(jogador.x + 16, jogador.y - 15, "+$60", 1, "texto");
                    } else {
                        dialogo = "Clarice (Rádio): Sua missão atual é elevar e manter a Saúde Ecológica em pelo menos 70%.";
                    }
                } 
                else if (idMissaoAtual === 2) {
                    if (saudeEcologica >= 82) {
                        idMissaoAtual = 3;
                        conscientizacao = 70;
                        dinheiro += 120;
                        dialogo = "Clarice (Rádio): Fantástico! Atingiu 82% de Saúde! Ganhou +$120. Meta Final: 95%!";
                        emitirParticulas(jogador.x + 16, jogador.y - 15, "+$120", 1, "texto");
                    } else {
                        dialogo = "Clarice (Rádio): Para a segunda missão, preciso que você leve a Saúde Ecológica para 82%.";
                    }
                } 
                else if (idMissaoAtual === 3) {
                    if (saudeEcologica >= 95) {
                        idMissaoAtual = 4;
                        conscientizacao = 100;
                        dinheiro += 250;
                        dialogo = "Clarice (Rádio): Incrível! O Vale Vivo atingiu a regeneração biológica plena a 95%! +$250!";
                        emitirParticulas(jogador.x + 16, jogador.y - 15, "+$250", 1, "texto");
                    } else {
                        dialogo = "Clarice (Rádio): Último esforço! Traga a Saúde Ecológica a 95% para salvar totalmente o vale.";
                    }
                } 
                else {
                    dialogo = "Clarice (Rádio): O vale está salvo! Sinta-se livre para continuar administrando a sua fazenda.";
                }
            }
        }

        function executarUpgrade(tipo, custo) {
            if (dinheiro >= custo && !jogador.upgrades[tipo]) {
                dinheiro -= custo;
                jogador.upgrades[tipo] = true;
                dialogo = `Tecnologia Ativada: ${tipo.toUpperCase()} integrada!`;
                emitirParticulas(jogador.x + 16, jogador.y + 20, "#3b82f6", 25);
            } else if (jogador.upgrades[tipo]) {
                dialogo = "Este módulo tecnológico já está operacional.";
            } else {
                dialogo = "Capital financeiro insuficiente.";
            }
        }

        function atualizar() {
            horaMundo += 0.0025;
            if(horaMundo >= 24) horaMundo = 0;

            if (menuUpgradesAberto) {
                if (teclas["1"]) executarUpgrade("irrigacao", 80);
                if (teclas["2"]) executarUpgrade("superSemente", 120);
                if (teclas["3"]) executarUpgrade("bioRacao", 150);
                teclas["1"] = teclas["2"] = teclas["3"] = false; 
                return; 
            }

            jogador.velX = 0; jogador.andando = false;
            if (teclas["a"] || teclas["arrowleft"]) { jogador.velX = -jogador.velocidade; jogador.olhandoPara = "esquerda"; jogador.andando = true; }
            if (teclas["d"] || teclas["arrowright"]) { jogador.velX = jogador.velocidade; jogador.olhandoPara = "direita"; jogador.andando = true; }

            jogador.x += jogador.velX; jogador.velY += GRAVIDADE; jogador.y += jogador.velY;

            if (jogador.y + jogador.altura >= chaoY) { jogador.y = chaoY - jogador.altura; jogador.velY = 0; jogador.noChao = true; }
            if (jogador.velY > 0 && jogador.x + jogador.largura > plataformaNPC.x && jogador.x < plataformaNPC.x + plataformaNPC.largura && jogador.y + jogador.altura >= plataformaNPC.y && jogador.y + jogador.altura - jogador.velY <= plataformaNPC.y) { 
                jogador.y = plataformaNPC.y - jogador.altura; jogador.velY = 0; jogador.noChao = true; 
            }
            jogador.x = Math.max(0, Math.min(LARGURA_MUNDO - jogador.largura, jogador.x));

            let idealCam = jogador.x - canvas.width / 2 + jogador.largura / 2;
            cameraX += (idealCam - cameraX) * 0.08;
            cameraX = Math.max(0, Math.min(LARGURA_MUNDO - canvas.width, cameraX));

            lotes.forEach(lote => { 
                if (lote.estado === 1) { 
                    let multCrescimento = jogador.upgrades.superSemente ? 1.5 : 1.0;
                    lote.progresso += 0.08 * multCrescimento; 
                    if (lote.progresso >= 100) lote.estado = 3; 
                } 
            });

            animais.forEach(ani => {
                ani.timer--;
                if(ani.timer <= 0) {
                    let acaso = Math.random();
                    ani.estado = acaso < 0.35 ? "andando" : (acaso < 0.7 ? "pastando" : "parado");
                    ani.timer = 60 + Math.random() * 100;
                    if(Math.random() > 0.5) ani.direcao *= -1;
                }

                if (saudeEcologica >= 20 && ani.estado === "andando") {
                    ani.x += ani.velX * ani.direcao;
                    if (ani.x < 180 || ani.x > 1400) ani.direcao *= -1;
                }
            });

            tempoAnimacao += 0.05;

            if (Math.random() < 0.07) {
                particulas.push({
                    x: Math.random() * LARGURA_MUNDO, y: 0,
                    vx: -1.0 - Math.random() * 1.5, vy: 1.5 + Math.random() * 2,
                    vida: 1.0, tipo: "folha", cor: saudeEcologica < 30 ? "#7c2d12" : "#16a34a", tam: 3 + Math.random() * 4
                });
            }

            for(let i = particulas.length - 1; i >= 0; i--) {
                let p = particulas[i];
                p.x += p.vx; p.y += p.vy;
                if(p.tipo === "efeito" || p.tipo === "splash") { p.vida -= 0.02; p.vy += 0.07; }
                if(p.tipo === "poeira") { p.vida -= 0.035; p.vx *= 0.94; }
                if(p.tipo === "texto") { p.vida -= 0.015; p.y -= 0.8; }
                if (p.y > chaoY || p.vida <= 0) particulas.splice(i, 1);
            }

            if (saudeEcologica >= 35) {
                borboletas.forEach(b => {
                    b.angulo += (Math.random() - 0.5) * 0.35;
                    b.x += Math.cos(b.angulo) * 1.1;
                    b.y += Math.sin(b.angulo) * 0.8 + Math.sin(tempoAnimacao * 0.5) * 0.3;
                    if (b.x < 0) b.x = LARGURA_MUNDO; if (b.x > LARGURA_MUNDO) b.x = 0;
                    if (b.y < 50) b.y = 350; if (b.y > 400) b.y = 90;
                });
            }
        }

        function desenharAvatar(ctx, x, y, camisaCor, cabeloCor, rumo, emMovimento, principal) {
            let respiracao = Math.sin(tempoAnimacao * 1.5) * 0.7;
            let oscilaY = emMovimento ? Math.sin(tempoAnimacao * 3.0) * 2.5 : respiracao;
            let pernasGiro = emMovimento ? Math.sin(tempoAnimacao * 3.0) * 5.5 : 0;

            ctx.save();
            ctx.translate(x - cameraX, y + oscilaY);

            ctx.fillStyle = "rgba(0, 0, 0, 0.3)";
            ctx.beginPath(); ctx.ellipse(16, 53 - oscilaY, 15, 4.5, 0, 0, Math.PI * 2); ctx.fill();

            ctx.fillStyle = "#020617"; 
            ctx.fillRect(4 + pernasGiro, 44 - respiracao, 8, 9 + respiracao); 
            ctx.fillRect(18 - pernasGiro, 44 - respiracao, 8, 9 + respiracao); 
            ctx.fillStyle = "#1d4ed8"; ctx.fillRect(4, 32, 23, 13); 

            ctx.fillStyle = camisaCor; ctx.fillRect(3, 16, 25, 16); 
            ctx.fillStyle = "rgba(0,0,0,0.2)"; ctx.fillRect(3, 29, 25, 3); 

            ctx.fillStyle = camisaCor;
            let bracoBalanco = emMovimento ? 0 : Math.sin(tempoAnimacao) * 1.4;
            if (rumo === "direita") {
                ctx.fillRect(emMovimento ? 2 : -2, 17, 5, 14 + bracoBalanco);
                ctx.fillStyle = "#fee2e2"; ctx.fillRect(emMovimento ? 2 : -2, 31 + bracoBalanco, 5, 4);
            } else {
                ctx.fillRect(28, 17, 5, 14 + bracoBalanco);
                ctx.fillStyle = "#fee2e2"; ctx.fillRect(28, 31 + bracoBalanco, 5, 4);
            }

            ctx.fillStyle = "#fee2e2"; ctx.fillRect(6, 4, 19, 13); 
            ctx.fillStyle = "#0f172a";
            let eyeX = rumo === "direita" ? 19 : 8;
            if (Math.floor(tempoAnimacao * 0.3) % 8 !== 0) {
                ctx.fillRect(eyeX, 9, 3, 4);
                ctx.fillRect(eyeX + (rumo === "direita" ? -6 : 6), 9, 3, 4);
            }

            ctx.fillStyle = cabeloCor; ctx.fillRect(5, 0, 21, 5); 
            if (rumo === "direita") { ctx.fillRect(5, 5, 5, 7); } else { ctx.fillRect(21, 5, 5, 7); }

            if (principal) {
                ctx.fillStyle = "#f59e0b"; ctx.fillRect(-4, -1, 39, 4); 
                ctx.fillStyle = "#ca8a04"; ctx.fillRect(5, -6, 21, 6); 
            } else {
                ctx.fillStyle = "#f43f5e"; ctx.fillRect(5, -2, 21, 3); 
            }

            if (principal && jogador.aguaNoBalde) {
                let bx = rumo === "direita" ? 28 : -12;
                ctx.fillStyle = "#64748b"; ctx.fillRect(bx, 24, 13, 13);
                ctx.fillStyle = "#0ea5e9"; ctx.fillRect(bx + 2, 24, 9, 3); 
            }
            ctx.restore();
        }

        function desenharAnimais() {
            animais.forEach(ani => {
                ctx.save();
                ctx.translate(ani.x - cameraX, ani.y);
                let cicloMov = ani.estado === "andando" ? Math.sin(tempoAnimacao * 4.0) * 2.0 : 0;
                let caudaFisica = Math.sin(tempoAnimacao * 3.0) * 5;
                let corPoluida = saudeEcologica < 25 ? "#4b5563" : null;

                if (ani.tipo === "vaca") {
                    ctx.fillStyle = corPoluida || "#f8fafc"; ctx.fillRect(0, 10, ani.largura, 25); 
                    if (!corPoluida) { ctx.fillStyle = "#0f172a"; ctx.fillRect(8, 12, 14, 11); ctx.fillRect(30, 15, 12, 12); }
                    ctx.fillStyle = "#475569"; ctx.fillRect(-4, 12 + caudaFisica/2, 3, 12); 
                    ctx.fillStyle = "#334155"; 
                    ctx.fillRect(4 + cicloMov, 35, 6, 8); ctx.fillRect(15 - cicloMov, 35, 6, 8);
                    ctx.fillRect(30 + cicloMov, 35, 6, 8); ctx.fillRect(42 - cicloMov, 35, 6, 8);
                    ctx.fillStyle = corPoluida || "#f1f5f9";
                    let hx = ani.direcao === 1 ? ani.largura - 4 : -14;
                    ctx.fillRect(hx, 2, 18, 18);
                    ctx.fillStyle = saudeEcologica < 25 ? "#374151" : "#f43f5e"; ctx.fillRect(hx + (ani.direcao === 1 ? 8 : -2), 8, 11, 11);
                    if (ani.prontoParaColeta && saudeEcologica >= 25) { ctx.fillStyle = "#ffffff"; ctx.font = "12px Arial"; ctx.fillText("🥛", 16, -6); }
                } 
                else if (ani.tipo === "galinha") {
                    let bicarEfeito = (ani.estado === "bicando" && Math.floor(tempoAnimacao) % 4 === 0) ? 3 : 0;
                    ctx.fillStyle = corPoluida || "#ea580c"; ctx.fillRect(0, 4 + bicarEfeito, ani.largura, 13); 
                    ctx.fillStyle = "#dc2626"; ctx.fillRect(ani.direcao === 1 ? ani.largura - 6 : 2, -2 + bicarEfeito, 6, 7); 
                    ctx.fillStyle = "#78350f"; ctx.fillRect(4, 17 + bicarEfeito, 3, 3); ctx.fillRect(14, 17 + bicarEfeito, 3, 3);
                    if (ani.prontoParaColeta && saudeEcologica >= 25) { ctx.fillStyle = "#ffffff"; ctx.font = "12px Arial"; ctx.fillText("🥚", 3, -8); }
                }
                else if (ani.tipo === "ovelha") {
                    ctx.fillStyle = corPoluida || "#f1f5f9"; 
                    ctx.beginPath(); ctx.arc(15, 16, 17, 0, Math.PI*2); ctx.arc(29, 17, 15, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = "#0f172a"; ctx.fillRect(5 + cicloMov, 30, 5, 8); ctx.fillRect(26 - cicloMov, 30, 5, 8); 
                    ctx.fillStyle = "#cbd5e1"; ctx.fillRect(ani.direcao === 1 ? ani.largura - 2 : -10, 6, 13, 13); 
                    if (ani.prontoParaColeta && saudeEcologica >= 25) { ctx.fillStyle = "#ffffff"; ctx.font = "12px Arial"; ctx.fillText("☁️", 13, -10); }
                }
                ctx.restore();
            });
        }

        function desenharCenario() {
            let r, g, b;
            if (saudeEcologica < 25) {
                r = 38; g = 38; b = 42; 
            } else {
                if (horaMundo >= 5 && horaMundo < 11) { 
                    let t = (horaMundo - 5) / 6; r = 40 + t*60; g = 30 + t*110; b = 100 + t*120; 
                } else if (horaMundo >= 11 && horaMundo < 17) { 
                    r = 100; g = 145; b = 225; 
                } else if (horaMundo >= 17 && horaMundo < 20) { 
                    let t = (horaMundo - 17) / 3; r = 100 + t*130; g = 145 - t*105; b = 225 - t*175; 
                } else { 
                    r = 12; g = 16; b = 32; 
                }
            }

            ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (horaMundo > 19 || horaMundo < 5) {
                ctx.fillStyle = "#ffffff";
                estrelas.forEach(e => {
                    ctx.globalAlpha = Math.abs(Math.sin(tempoAnimacao * 0.8 + e.brilho * 8));
                    ctx.fillRect(e.x - cameraX * 0.4, e.y, e.tam, e.tam); 
                });
                ctx.globalAlpha = 1.0;
            }

            ctx.fillStyle = saudeEcologica < 25 ? "#1f2937" : "#14532d";
            ctx.beginPath(); ctx.moveTo(0, chaoY); ctx.lineTo(300 - cameraX * 0.3, 250); ctx.lineTo(750 - cameraX * 0.3, chaoY); ctx.fill();
            ctx.fillStyle = saudeEcologica < 25 ? "#374151" : "#166534";
            ctx.beginPath(); ctx.moveTo(150 - cameraX * 0.6, chaoY); ctx.lineTo(600 - cameraX * 0.6, 210); ctx.lineTo(1100 - cameraX * 0.6, chaoY); ctx.fill();

            let ventoOnda = Math.sin(tempoAnimacao) * 2.8;
            ctx.fillStyle = "#3b1e08"; ctx.fillRect(280 - cameraX, chaoY - 85, 14, 85); 
            ctx.fillStyle = saudeEcologica < 25 ? "#451a03" : "#15803d";
            ctx.beginPath(); ctx.arc(287 - cameraX + ventoOnda, chaoY - 95, 42, 0, Math.PI*2); ctx.fill();

            ctx.fillStyle = "#334155"; ctx.fillRect(areaPoco.x - cameraX, areaPoco.y + 35, areaPoco.largura, 55); 
            ctx.fillStyle = "#0f172a"; ctx.fillRect(areaPoco.x + 12 - cameraX, areaPoco.y + 45, areaPoco.largura - 24, 40); 
            ctx.fillStyle = saudeEcologica < 25 ? "#581c87" : "#0284c7"; ctx.fillRect(areaPoco.x + 14 - cameraX, areaPoco.y + 52, areaPoco.largura - 28, 28); 
            ctx.fillStyle = "#5c2d17"; ctx.fillRect(areaPoco.x + 12 - cameraX, areaPoco.y, 8, 35); ctx.fillRect(areaPoco.x + areaPoco.largura - 20 - cameraX, areaPoco.y, 8, 35); 
            ctx.fillStyle = "#991b1b"; ctx.fillRect(areaPoco.x - 6 - cameraX, areaPoco.y - 6, areaPoco.largura + 12, 12); 

            ctx.fillStyle = "#1e293b"; ctx.fillRect(areaSilo.x - cameraX, areaSilo.y, areaSilo.largura, areaSilo.height);
            ctx.fillStyle = "#475569"; ctx.beginPath(); ctx.arc(areaSilo.x + 50 - cameraX, areaSilo.y, 50, Math.PI, 0); ctx.fill();
            ctx.fillStyle = "#f59e0b"; ctx.font = "bold 11px sans-serif"; ctx.fillText("TECNOLOGIA [I]", areaSilo.x + 8 - cameraX, areaSilo.y + 65);

            ctx.fillStyle = "#451a03";
            for(let cx = 80; cx < 1650; cx += 50) {
                ctx.fillRect(cx - cameraX, chaoY - 28, 6, 28);
                ctx.fillRect(cx - cameraX, chaoY - 20, 50, 4);
            }

            particulas.forEach(p => {
                ctx.fillStyle = p.cor; ctx.globalAlpha = p.vida;
                if(p.tipo === "texto") {
                    ctx.font = "bold 14px monospace"; ctx.fillText(p.texto, p.x - cameraX, p.y);
                } else {
                    ctx.fillRect(p.x - cameraX, p.y, p.tam, p.tam);
                }
                ctx.globalAlpha = 1.0;
            });

            ctx.fillStyle = "#14110f"; ctx.fillRect(0, chaoY, canvas.width, canvas.height - chaoY);
            ctx.fillStyle = saudeEcologica < 25 ? "#3f2314" : "#166534"; ctx.fillRect(0, chaoY, canvas.width, 16); 

            ctx.fillStyle = "#451a03"; 
            ctx.fillRect(plataformaNPC.x + 25 - cameraX, plataformaNPC.y, 14, chaoY - plataformaNPC.y);
            ctx.fillRect(plataformaNPC.x + plataformaNPC.largura - 39 - cameraX, plataformaNPC.y, 14, chaoY - plataformaNPC.y);
            ctx.fillStyle = "#854d0e"; ctx.fillRect(plataformaNPC.x - cameraX, plataformaNPC.y, plataformaNPC.largura, plataformaNPC.height);

            if (horaMundo > 19 || horaMundo < 5) {
                let opacidadeNoite = horaMundo > 21 || horaMundo < 3 ? 0.65 : 0.4;
                ctx.fillStyle = `rgba(5, 5, 15, ${opacidadeNoite})`;
                ctx.globalCompositeOperation = "multiply"; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.globalCompositeOperation = "source-over";
            }
        }

        function desenharLotes() {
            lotes.forEach(lote => {
                ctx.fillStyle = (lote.estado === 1) ? "#14110f" : "#221208";
                ctx.fillRect(lote.x - cameraX, lote.y, lote.largura, lote.altura);

                if (jogador.upgrades.irrigacao && lote.estado > 0) {
                    ctx.fillStyle = "#38bdf8"; ctx.fillRect(lote.x + lote.largura/2 - 2 - cameraX, lote.y - 12, 4, 12);
                    if(Math.random() < 0.2) emitirParticulas(lote.x + lote.largura/2, lote.y - 12, "#38bdf8", 1, "splash");
                }

                ctx.fillStyle = "#451a03"; ctx.fillRect(lote.x + lote.largura/2 - 2 - cameraX, lote.y + lote.altura, 4, 14);
                ctx.fillStyle = "#b45309"; ctx.fillRect(lote.x + lote.largura/2 - 14 - cameraX, lote.y + lote.altura + 3, 28, 12);
                ctx.fillStyle = "#ffffff"; ctx.font = "bold 9px sans-serif"; ctx.fillText("LOT" + lote.id, lote.x + lote.largura/2 - 10 - cameraX, lote.y + lote.altura + 12);

                let cX = lote.x + lote.largura / 2 - cameraX;
                let cY = lote.y;

                if (lote.estado === 1 || lote.estado === 2) {
                    let hMuda = lote.estado === 1 ? 18 : 8;
                    ctx.fillStyle = "#4ade80"; ctx.fillRect(cX - 3, cY - hMuda, 6, hMuda); 
                    ctx.fillStyle = "#16a34a"; ctx.fillRect(cX - 10, cY - hMuda + 2, 7, 4);
                } 
                else if (lote.estado === 3) {
                    ctx.fillStyle = "#14532d"; ctx.beginPath(); ctx.arc(cX, cY - 16, 20, 0, Math.PI*2); ctx.fill();
                    if (lote.insumo === "organico") {
                        ctx.fillStyle = "#fbbf24"; ctx.beginPath(); ctx.arc(cX, cY - 18, 9, 0, Math.PI*2); ctx.fill(); 
                    } else {
                        ctx.fillStyle = "#ca8a04"; ctx.fillRect(cX - 12, cY - 26, 24, 10); 
                    }
                }
            });
        }

        function desenharInterfaceUpgrades() {
            ctx.fillStyle = "rgba(10, 15, 30, 0.95)"; ctx.strokeStyle = "#3b82f6"; ctx.lineWidth = 4;
            ctx.fillRect(180, 80, 600, 350); ctx.strokeRect(180, 80, 600, 350);
            ctx.fillStyle = "#38bdf8"; ctx.font = "bold 20px sans-serif"; ctx.fillText("PAINEL DE UPGRADES TECNOLÓGICOS", 220, 120);
            ctx.font = "14px sans-serif"; ctx.fillStyle = "#94a3b8"; ctx.fillText("Pressione o número correspondente para adquirir:", 220, 150);

            ctx.fillStyle = jogador.upgrades.irrigacao ? "#22c55e" : "#f1f5f9";
            ctx.fillText("[1] Sistema de Aspersores Bióticos (Custo: $80)", 220, 200);
            ctx.fillStyle = "#64748b"; ctx.fillText(jogador.upgrades.irrigacao ? "-> ATIVADO (Lotes não precisam mais de rega manual)" : "-> Mantém o solo umectado", 240, 220);

            ctx.fillStyle = jogador.upgrades.superSemente ? "#22c55e" : "#f1f5f9";
            ctx.fillText("[2] Engenharia de Super Sementes (Custo: $120)", 220, 260);
            ctx.fillStyle = "#64748b"; ctx.fillText(jogador.upgrades.superSemente ? "-> ATIVADO (+50% velocidade em plantas lentas)" : "-> Aumenta valor de venda e velocidade", 240, 280);

            ctx.fillStyle = jogador.upgrades.bioRacao ? "#22c55e" : "#f1f5f9";
            ctx.fillText("[3] Bio-Ração de Fitoplâncton (Custo: $150)", 220, 340);
            ctx.fillStyle = "#64748b"; ctx.fillText(jogador.upgrades.bioRacao ? "-> ATIVADO (+50% de rendimento)" : "-> Maximiza a coleta animal", 240, 360);

            ctx.fillStyle = "#38bdf8"; ctx.font = "bold 13px sans-serif"; ctx.fillText("Pressione [I] para Fechar o Menu", 380, 400);
        }

        function desenharHUD() {
            ctx.fillStyle = "rgba(15, 23, 42, 0.85)"; ctx.fillRect(0, 0, canvas.width, 50);
            ctx.font = "bold 14px sans-serif";

            ctx.fillStyle = "#22c55e"; ctx.fillText(`Capital: $${dinheiro}`, 20, 30);

            let corEco = saudeEcologica > 60 ? "#22c55e" : (saudeEcologica > 30 ? "#eab308" : "#ef4444");
            ctx.fillStyle = corEco; ctx.fillText(`Saúde Ecológica: ${saudeEcologica}%`, 180, 30);

            ctx.fillStyle = "#ec4899"; ctx.fillText(`Conscientização: ${conscientizacao}%`, 400, 30);

            ctx.fillStyle = "#94a3b8";
            let minutos = Math.floor((horaMundo % 1) * 60).toString().padStart(2, '0');
            let horas = Math.floor(horaMundo).toString().padStart(2, '0');
            ctx.fillText(`Tempo: ${horas}:${minutos}h`, 620, 30);

            ctx.fillStyle = "#38bdf8";
            let txtMissao = idMissaoAtual === 1 ? "Meta 1: 70% Saúde" : idMissaoAtual === 2 ? "Meta 2: 82% Saúde" : idMissaoAtual === 3 ? "Meta Final: 95% Saúde" : "Tudo Concluído! 🎉";
            ctx.fillText(txtMissao, 780, 30);

            ctx.fillStyle = "rgba(15, 23, 42, 0.9)"; ctx.fillRect(10, canvas.height - 45, canvas.width - 20, 35);
            ctx.strokeStyle = "#1e293b"; ctx.strokeRect(10, canvas.height - 45, canvas.width - 20, 35);
            ctx.fillStyle = "#f1f5f9"; ctx.font = "13px sans-serif"; ctx.fillText(dialogo, 25, canvas.height - 23);
        }

        function loop() {
            atualizar();
            desenharCenario();
            desenharLotes();
            desenharAnimais();
            
            desenharAvatar(ctx, npc.x, npc.y, "#db2777", "#f472b6", "esquerda", false, false); 
            desenharAvatar(ctx, jogador.x, jogador.y, "#0284c7", "#f59e0b", jogador.olhandoPara, jogador.andando, true); 

            if (menuUpgradesAberto) desenharInterfaceUpgrades();
            
            desenharHUD();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
