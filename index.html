<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoVale: Raízes do Amanhã</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            color: white;
            flex-direction: column;
        }
        canvas {
            border: 4px solid #333;
            background-color: #228B22; /* Cor da grama */
            box-shadow: 0px 0px 20px rgba(0,0,0,0.5);
        }
        .instrucoes {
            margin-top: 15px;
            text-align: center;
            font-size: 16px;
            color: #ccc;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="500"></canvas>
    
    <div class="instrucoes">
        <strong>Controles:</strong> Use as setas do teclado ou W, A, S, D para mover o quadrado azul.<br>
        Fique em cima da terra marrom e pressione:<br>
        <strong>[1]</strong> Plantar Orgânico (Custa $10, +5% Eco) | 
        <strong>[2]</strong> Plantar Químico (Custa $5, -15% Eco)<br>
        <strong>[R]</strong> Regar planta | 
        <strong>[E]</strong> Colher planta madura
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Variáveis do Jogo
        let jogador = { x: 400, y: 250, tamanho: 30, velocidade: 4 };
        let dinheiro = 100;
        let saudeEcologica = 50; // Escala de 0 a 100

        // Estrutura do Lote de Terra
        // Estados: 0 = Seco, 1 = Molhado/Crescendo, 2 = Plantado(esperando rega), 3 = Pronto para Colheita
        let lote = {
            x: 350,
            y: 180,
            largura: 100,
            altura: 100,
            estado: 0,
            progresso: 0,
            insumo: null
        };

        // Teclas pressionadas
        let teclas = {};

        window.addEventListener("keydown", (e) => {
            teclas[e.key.toLowerCase()] = true;
            verificarInteracao(e.key.toLowerCase());
        });
        window.addEventListener("keyup", (e) => {
            teclas[e.key.toLowerCase()] = false;
        });

        // Verifica colisões entre o jogador e o lote
        function checarColisao() {
            return (
                jogador.x < lote.x + lote.largura &&
                jogador.x + jogador.tamanho > lote.x &&
                jogador.y < lote.y + lote.altura &&
                jogador.y + jogador.tamanho > lote.y
            );
        }

        // Interações baseadas nas teclas
        function verificarInteracao(tecla) {
            if (!checarColisao()) return;

            // 1. Plantar Orgânico
            if (tecla === "1" && lote.estado === 0 && dinheiro >= 10) {
                dinheiro -= 10;
                lote.estado = 2;
                lote.insumo = "organico";
                saudeEcologica = Math.min(100, saudeEcologica + 5);
            }
            // 2. Plantar Químico
            else if (tecla === "2" && lote.estado === 0 && dinheiro >= 5) {
                dinheiro -= 5;
                lote.estado = 2;
                lote.insumo = "quimico";
                saudeEcologica = Math.max(0, saudeEcologica - 15);
            }
            // 3. Regar
            else if (tecla === "r" && lote.estado === 2) {
                lote.estado = 1; // Começa a crescer
            }
            // 4. Colher
            else if (tecla === "e" && lote.estado === 3) {
                if (lote.insumo === "organico") {
                    dinheiro += 25;
                } else if (lote.insumo === "quimico") {
                    dinheiro += 40;
                }
                // Reseta o lote
                lote.estado = 0;
                lote.progresso = 0;
                lote.insumo = null;
            }
        }

        // Atualiza a lógica (Movimento e Crescimento)
        function atualizar() {
            // Movimentação
            if (teclas["a"] || teclas["arrowleft"]) jogador.x -= jogador.velocidade;
            if (teclas["d"] || teclas["arrowright"]) jogador.x += jogador.velocidade;
            if (teclas["w"] || teclas["arrowup"]) jogador.y -= jogador.velocidade;
            if (teclas["s"] || teclas["arrowdown"]) jogador.y += jogador.velocidade;

            // Limites da tela para o jogador
            jogador.x = Math.max(0, Math.min(canvas.width - jogador.tamanho, jogador.x));
            jogador.y = Math.max(0, Math.min(canvas.height - jogador.tamanho, jogador.y));

            // Lógica de crescimento da planta
            if (lote.estado === 1) {
                lote.progresso += 0.5; // Velocidade do crescimento
                if (lote.progresso >= 100) {
                    lote.estado = 3; // Pronta para colheita
                }
            }
        }

        // Desenha os elementos na tela
        function desenhar() {
            // Limpa a tela com a cor da grama
            ctx.fillStyle = "#228B22";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 1. Desenhar o Lote de Terra
            if (lote.estado === 1) {
                ctx.fillStyle = "#654321"; // Terra úmida
            } else {
                ctx.fillStyle = "#8B4513"; // Terra seca
            }
            ctx.fillRect(lote.x, lote.y, lote.largura, lote.altura);

            // 2. Desenhar a planta sobre a terra
            let centroX = lote.x + lote.largura / 2;
            let centroY = lote.y + lote.altura / 2;

            if (lote.estado === 1 || lote.estado === 2) {
                ctx.fillStyle = "#90EE90"; // Planta jovem (Verde claro)
                ctx.beginPath();
                ctx.arc(centroX, centroY, 15, 0, Math.PI * 2);
                ctx.fill();
            } else if (lote.estado === 3) {
                ctx.fillStyle = "#FFD700"; // Planta pronta (Dourado/Fruto)
                ctx.beginPath();
                ctx.arc(centroX, centroY, 22, 0, Math.PI * 2);
                ctx.fill();
            }

            // 3. Desenhar o Jogador
            ctx.fillStyle = "#0000FF"; // Azul
            ctx.fillRect(jogador.x, playerY = jogador.y, jogador.tamanho, jogador.tamanho);

            // 4. Desenhar a Interface de Texto (HUD)
            ctx.fillStyle = "white";
            ctx.font = "20px Arial";
            ctx.fillText(`Dinheiro: $${dinheiro}`, 20, 35);
            
            // Muda a cor do texto ecológico baseado no estado
            if (saudeEcologica > 60) ctx.fillStyle = "#55FF55";
            else if (saudeEcologica > 30) ctx.fillStyle = "#FFFF55";
            else ctx.fillStyle = "#FF5555";
            
            ctx.fillText(`Saúde Ecológica: ${saudeEcologica}%`, 20, 65);
        }

        // Loop principal do jogo
        function loop() {
            atualizar();
            desenhar();
            requestAnimationFrame(loop);
        }

        // Inicia o jogo
        loop();
    </script>
</body>
</html>
