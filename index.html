<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stardew Craft: Ultimate Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'VT323', monospace;
            font-size: 24px;
            text-align: center;
            background-color: #1a110b;
            background-image: radial-gradient(#2e1f14 20%, transparent 20%);
            background-size: 16px 16px;
            color: #fff8eb;
            margin: 0;
            padding: 10px;
            user-select: none;
            overflow: hidden;
        }
        
        h1 { 
            margin: 2px 0; 
            color: #ffcc00; 
            font-size: 42px; 
            text-shadow: 3px 3px 0px #4a2f13;
        }

        /* Top HUD de Sobrevivência */
        .hud-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 10px;
        }
        
        .hud-box {
            background-color: #b97038;
            padding: 5px 15px;
            border-radius: 8px;
            font-size: 26px;
            color: #fff1d4;
            border: 4px solid #4a2a14;
            box-shadow: inset -3px -3px 0px #82471d, inset 3px 3px 0px #e69d65;
            text-shadow: 2px 2px 0px #3c1f0b;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Barra de Energia Vertical clássica */
        .energia-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 18px;
        }
        .energia-barra-fundo {
            width: 20px;
            height: 100px;
            background-color: #4a1414;
            border: 3px solid #4a2a14;
            border-radius: 4px;
            position: relative;
        }
        .energia-barra-preenchimento {
            width: 100%;
            height: 100%;
            background-color: #2ecc71;
            position: absolute;
            bottom: 0;
            transition: height 0.2s, background-color 0.3s;
        }
        
        canvas {
            background-color: #4a7027;
            cursor: crosshair;
            border: 6px solid #4a2a14;
            border-radius: 12px;
            image-rendering: pixelated;
            box-shadow: 0px 6px 0px rgba(0,0,0,0.6);
        }

        /* Hotbar de Itens inferior estilo Minecraft/Stardew */
        .hotbar-container {
            margin-top: 10px;
            display: flex;
            justify-content: center;
        }
        
        .hotbar {
            display: flex;
            background: #2b180a;
            padding: 6px;
            border-radius: 8px;
            border: 4px solid #5c3418;
            gap: 4px;
        }
        
        .slot {
            background: #cc8443;
            color: #fff1d4;
            width: 70px;
            height: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 3px solid #733e17;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            box-shadow: inset 2px 2px 0px #e69d65;
        }
        
        .slot.selecionado { 
            border-color: #ffffff; 
            background: #ffebd1;
            color: #3c1f0b;
            box-shadow: 0px 0px 10px #ffcc00, inset 2px 2px 0px #ffffff;
        }
        
        .slot .tecla-atalho {
            position: absolute;
            top: 2px;
            left: 4px;
            font-size: 14px;
            color: rgba(0,0,0,0.4);
            font-weight: bold;
        }
        .slot.selecionado .tecla-atalho { color: rgba(0,0,0,0.6); }
        .slot span { font-size: 28px; }
        .slot .custo { font-size: 14px; font-weight: bold; color: #4a2a14;}

        #mensagem {
            font-size: 26px;
            color: #ff4a4a;
            text-shadow: 2px 2px 0px #000;
            margin-top: 5px;
            height: 30px;
        }
        #dica { font-size: 16px; color: #8a8a8a; margin-top: 2px; }
    </style>
</head>
<body>

    <h1>✨ Stardew Craft: RPG Edition ✨</h1>

    <div class="hud-container">
        <div class="hud-box">🪙 <span id="moedas">50</span>g</div>
        <div class="hud-box">📅 Dia <span id="dia">1</span> - <span id="relogio">06:00</span></div>
        <div class="hud-box energia-container">
            ⚡E
            <div class="energia-barra-fundo">
                <div id="energiaBarra" class="energia-barra-preenchimento"></div>
            </div>
        </div>
    </div>

    <canvas id="jogoCanvas" width="600" height="400"></canvas>

    <div class="hotbar-container">
        <div class="hotbar">
            <div class="slot selecionado" id="slot-1" onclick="trocarSlot(1, 'safra')">
                <div class="tecla-atalho">1</div>
                <span>🌾</span><div class="custo">5g</div>
            </div>
            <div class="slot" id="slot-2" onclick="trocarSlot(2, 'agro')">
                <div class="tecla-atalho">2</div>
                <span>🧪</span><div class="custo">5g</div>
            </div>
            <div class="slot" id="slot-3" onclick="trocarSlot(3, 'arvore')">
                <div class="tecla-atalho">3</div>
                <span>🌳</span><div class="custo">12g</div>
            </div>
            <div class="slot" id="slot-4" onclick="trocarSlot(4, 'bio')">
                <div class="tecla-atalho">4</div>
                <span>🧫</span><div class="custo">8g</div>
            </div>
            <div class="slot" id="slot-5" onclick="trocarSlot(5, 'enxada')">
                <div class="tecla-atalho">5</div>
                <span>🪓</span><div class="custo">0g</div>
            </div>
        </div>
    </div>

    <div id="mensagem"></div>
    <div id="dica">Controles: <b>WASD / Setas</b> para andar. Teclas <b>1 a 5</b> selecionam ferramentas. Clique perto para agir.</div>

    <script>
        const canvas = document.getElementById('jogoCanvas');
        const ctx = canvas.getContext('2d');
        
        // Mundo Expandido
        const tamanhoCélula = 50;
        const colunasMundo = 24;
        const linhasMundo = 24;
        const larguraMundo = colunasMundo * tamanhoCélula;
        const alturaMundo = linhasMundo * tamanhoCélula;

        // IDs dos Blocos: 0=Grama, 1=Terra Arada, 2=Safra Crescendo, 3=Safra Pronta, 4=Árvore, 5=Pedra de Minério, 6=Safra Química
        let gradeMundo = [];
        for (let i = 0; i < colunasMundo; i++) {
            gradeMundo[i] = [];
            for (let j = 0; j < linhasMundo; j++) {
                let rand = Math.random();
                if (rand > 0.92) gradeMundo[i][j] = 5; // Gera Pedras
                else if (rand > 0.85) gradeMundo[i][j] = 4; // Gera Árvores Nativas
                else if (rand > 0.60) gradeMundo[i][j] = 1; // Terra arada vazia
                else gradeMundo[i][j] = 0; // Grama
            }
        }

        // Jogador
        let jogador = {
            x: larguraMundo / 2,
            y: alturaMundo / 2,
            velocidade: 4,
            tamanho: 22,
            energia: 100,
            maxEnergia: 100
        };

        // Tempo e Economia
        let moedas = 50;
        let saudeSolo = 100;
        let ferramentaSelecionada = 'safra';
        let slotAtivo = 1;
        let jogoAtivo = true;
        let teclas = {};
        
        // Relógio do Jogo
        let tempo = { dia: 1, hora: 6, minuto: 0 };

        // Textos flutuantes para efeitos visuais (+10g, -4 Energia)
        let textosFlutuantes = [];

        // Mapeamento de Ferramentas por Teclado (1-5)
        const ferramentasPorSlot = {
            1: 'safra',
            2: 'agro',
            3: 'arvore',
            4: 'bio',
            5: 'enxada'
        };

        window.addEventListener('keydown', e => {
            teclas[e.key.toLowerCase()] = true;
            if (['1','2','3','4','5'].includes(e.key)) {
                trocarSlot(parseInt(e.key), ferramentasPorSlot[e.key]);
            }
        });
        window.addEventListener('keyup', e => teclas[e.key.toLowerCase()] = false);

        function trocarSlot(num, ferramenta) {
            slotAtivo = num;
            ferramentaSelecionada = ferramenta;
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('selecionado'));
            document.getElementById(`slot-${num}`).classList.add('selecionado');
        }

        function adicionarTextoFlutuante(txt, x, y, cor) {
            textosFlutuantes.push({ txt: txt, x: x, y: y, alfa: 1, yVel: -1 });
        }

        // Clique de Ação
        canvas.addEventListener('mousedown', function(e) {
            if (!jogoAtivo) return;

            if (jogador.energia <= 0) {
                mostrarMensagem("Você está exausto! Precisa dormir para recuperar as energias.");
                return;
            }

            const rect = canvas.getBoundingClientRect();
            const cameraX = jogador.x - canvas.width / 2;
            const cameraY = jogador.y - canvas.height / 2;
            
            const mundoX = (e.clientX - rect.left) + cameraX;
            const mundoY = (e.clientY - rect.top) + cameraY;

            const bX = Math.floor(mundoX / tamanhoCélula);
            const bY = Math.floor(mundoY / tamanhoCélula);

            if(bX < 0 || bX >= colunasMundo || bY < 0 || bY >= linhasMundo) return;

            // Checar proximidade (Raio de ação do jogador)
            const dist = Math.hypot((bX * tamanhoCélula + 25) - jogador.x, (bY * tamanhoCélula + 25) - jogador.y);
            if (dist > tamanhoCélula * 2.2) {
                mostrarMensagem("Muito longe!");
                return;
            }

            let bloco = gradeMundo[bX][bY];
            let acaoEfetuada = false;

            // Lógica Avançada de Ferramentas e Recursos
            if (ferramentaSelecionada === 'safra' && bloco === 1 && moedas >= 5) {
                moedas -= 5;
                gradeMundo[bX][bY] = 2; // Planta Semente
                acaoEfetuada = true;
            } 
            else if (ferramentaSelecionada === 'agro' && bloco === 2 && moedas >= 5) {
                moedas -= 5;
                gradeMundo[bX][bY] = 6; // Torna Química
                acaoEfetuada = true;
            } 
            else if (ferramentaSelecionada === 'arvore' && (bloco === 0 || bloco === 1) && moedas >= 12) {
                moedas -= 12;
                gradeMundo[bX][bY] = 4; // Nasce Árvore
                acaoEfetuada = true;
            } 
            else if (ferramentaSelecionada === 'bio' && moedas >= 8) {
                moedas -= 8;
                saudeSolo = Math.min(100, saudeSolo + 15);
                adicionarTextoFlutuante("+15 Solo", mundoX, mundoY, '#2ecc71');
                acaoEfetuada = true;
            } 
            else if (ferramentaSelecionada === 'enxada') {
                if (bloco === 3) { // Colher Planta Pronta
                    moedas += 15;
                    gradeMundo[bX][bY] = 1;
                    adicionarTextoFlutuante("+15g", mundoX, mundoY, '#f1c40f');
                    acaoEfetuada = true;
                } else if (bloco === 6) { // Colher Planta Química (Dá mais dinheiro, destrói o solo)
                    moedas += 28;
                    gradeMundo[bX][bY] = 1;
                    saudeSolo = Math.max(0, saudeSolo - 10);
                    adicionarTextoFlutuante("+28g", mundoX, mundoY, '#9b59b6');
                    acaoEfetuada = true;
                } else if (bloco === 4) { // Cortar Árvore (Madeira/Coleta)
                    moedas += 8;
                    gradeMundo[bX][bY] = 1;
                    adicionarTextoFlutuante("+8g Madeira", mundoX, mundoY, '#da9e5f');
                    acaoEfetuada = true;
                } else if (bloco === 5) { // Minar Pedra
                    moedas += 20;
                    gradeMundo[bX][bY] = 1;
                    adicionarTextoFlutuante("+20g Pedra/Carvão", mundoX, mundoY, '#bdc3c7');
                    acaoEfetuada = true;
                } else if (bloco === 0) { // Capinar grama para virar terra
                    gradeMundo[bX][bY] = 1;
                    acaoEfetuada = true;
                }
            }

            if (acaoEfetuada) {
                jogador.energia = Math.max(0, jogador.energia - 4);
                adicionarTextoFlutuante("-4 E", jogador.x, jogador.y - 20, '#ff7675');
                atualizarUI();
            }
        });

        function mostrarMensagem(txt) {
            const div = document.getElementById('mensagem');
            div.innerText = txt;
            setTimeout(() => { if(jogoAtivo) div.innerText = ""; }, 2500);
        }

        // Relógio e crescimento das plantações
        setInterval(() => {
            if (!jogoAtivo) return;

            // Avança o tempo
            tempo.minuto += 10;
            if (tempo.minuto >= 60) {
                tempo.minuto = 0;
                tempo.hora++;
            }
            if (tempo.hora >= 24) {
                tempo.hora = 0;
                tempo.dia++;
                // Novo dia restaura um pouco de energia naturalmente se foi dormir cedo
                jogador.energia = jogador.maxEnergia;
                mostrarMensagem("🌅 Um novo dia amanheceu no vale!");
            }

            // Desmaiar às 02:00 da manhã
            if (tempo.hora === 2 && tempo.minuto === 0) {
                jogador.energia = 50; // Penalidade de energia
                moedas = Math.max(0, moedas - 20); // Taxa médica do Dr. Harvey
                tempo.hora = 6;
                tempo.minuto = 0;
                tempo.dia++;
                mostrarMensagem("⚰️ Você desmaiou de sono! O médico te cobrou 20g.");
            }

            // Lógica de crescimento aleatório de safras
            for (let i = 0; i < colunasMundo; i++) {
                for (let j = 0; j < linhasMundo; j++) {
                    if (gradeMundo[i][j] === 2 && Math.random() > 0.6) {
                        gradeMundo[i][j] = 3; // Trigo cresceu e está pronto para colher!
                    }
                }
            }

            atualizarUI();
            checarFimDeJogo();
        }, 1200);

        function atualizarUI() {
            document.getElementById('moedas').innerText = moedas;
            document.getElementById('dia').innerText = tempo.dia;
            
            let mStr = tempo.minuto === 0 ? "00" : tempo.minuto;
            let hStr = tempo.hora < 10 ? "0" + tempo.hora : tempo.hora;
            document.getElementById('relogio').innerText = `${hStr}:${mStr}`;

            // Atualiza Barra de Energia
            let pctEnergia = (jogador.energia / jogador.maxEnergia) * 100;
            const bEnergia = document.getElementById('energiaBarra');
            bEnergia.style.height = pctEnergia + "%";
            if (pctEnergia < 25) bEnergia.style.backgroundColor = '#ff4a4a';
            else if (pctEnergia < 50) bEnergia.style.backgroundColor = '#f1c40f';
            else bEnergia.style.backgroundColor = '#2ecc71';
        }

        // Loop de Renderização Principal (60 FPS)
        function loopPrincipal() {
            // Movimentação
            if (jogoAtivo) {
                let velAtual = jogador.energia <= 0 ? 1.2 : jogador.velocidade; // Exaustão diminui velocidade
                if (teclas['w'] || teclas['arrowup']) jogador.y -= velAtual;
                if (teclas['s'] || teclas['arrowdown']) jogador.y += velAtual;
                if (teclas['a'] || teclas['arrowleft']) jogador.x -= velAtual;
                if (teclas['d'] || teclas['arrowright']) jogador.x += velAtual;

                // Colisão com as bordas do Mundo Aberto
                jogador.x = Math.max(jogador.tamanho, Math.min(larguraMundo - jogador.tamanho, jogador.x));
                jogador.y = Math.max(jogador.tamanho, Math.min(alturaMundo - jogador.tamanho, jogador.y));
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const cameraX = jogador.x - canvas.width / 2;
            const cameraY = Math.max(0, jogador.y - canvas.height / 2);

            // 1. DESENHAR O MAPA MUNDI
            for (let i = 0; i < colunasMundo; i++) {
                for (let j = 0; j < linhasMundo; j++) {
                    let cx = i * tamanhoCélula - cameraX;
                    let cy = j * tamanhoCélula - cameraY;

                    if (cx + tamanhoCélula < 0 || cx > canvas.width || cy + tamanhoCélula < 0 || cy > canvas.height) continue;

                    let bloco = gradeMundo[i][j];

                    // Desenha Solo Base
                    if (bloco === 0) {
                        ctx.fillStyle = '#5c8a36'; // Grama viva
                        ctx.fillRect(cx, cy, tamanhoCélula, tamanhoCélula);
                    } else {
                        ctx.fillStyle = '#734d26'; // Terra arada rica
                        ctx.fillRect(cx, cy, tamanhoCélula, tamanhoCélula);
                        ctx.fillStyle = '#593a1c';
                        ctx.fillRect(cx + 4, cy + 20, tamanhoCélula - 8, 4); // Textura de sulco
                    }

                    // Elementos sobrepostos pixelados
                    if (bloco === 2) { // Brotando
                        ctx.fillStyle = '#78e08f';
                        ctx.fillRect(cx + 22, cy + 30, 6, 12);
                    } 
                    else if (bloco === 3) { // Trigo Maduro Pronto
                        ctx.fillStyle = '#f39c12';
                        ctx.fillRect(cx + 18, cy + 15, 6, 25);
                        ctx.fillRect(cx + 28, cy + 10, 6, 30);
                        ctx.fillStyle = '#f1c40f';
                        ctx.fillRect(cx + 15, cy + 10, 20, 5);
                    } 
                    else if (bloco === 4) { // Árvore Grande
                        ctx.fillStyle = '#4e3629'; // Tronco
                        ctx.fillRect(cx + 21, cy + 22, 8, 22);
                        ctx.fillStyle = '#27ae60'; // Folhagem
                        ctx.beginPath(); ctx.arc(cx + 25, cy + 16, 16, 0, Math.PI*2); ctx.fill();
                    } 
                    else if (bloco === 5) { // Pedra de Minério
                        ctx.fillStyle = '#7f8c8d'; // Pedra
                        ctx.fillRect(cx + 12, cy + 16, 26, 24);
                        ctx.fillStyle = '#f1c40f'; // Pepitas de ouro dentro
                        ctx.fillRect(cx + 18, cy + 22, 6, 6);
                        ctx.fillRect(cx + 28, cy + 28, 4, 4);
                    }
                    else if (bloco === 6) { // Safra Química Mutante
                        ctx.fillStyle = '#8e44ad'; // Roxa radioativa
                        ctx.fillRect(cx + 16, cy + 16, 18, 24);
                        ctx.fillStyle = '#2ecc71';
                        ctx.fillRect(cx + 22, cy + 8, 6, 8);
                    }

                    // Linha sutil de grid estilo sandbox
                    ctx.strokeStyle = 'rgba(0,0,0,0.04)';
                    ctx.strokeRect(cx, cy, tamanhoCélula, tamanhoCélula);
                }
            }

            // 2. DESENHAR O JOGADOR (Fazendeiro Pixel)
            let jtX = jogador.x - cameraX;
            let jtY = jogador.y - cameraY;

            ctx.fillStyle = 'rgba(0,0,0,0.15)'; // Sombra redonda
            ctx.beginPath(); ctx.ellipse(jtX, jtY + 12, 12, 5, 0, 0, Math.PI*2); ctx.fill();

            ctx.fillStyle = '#3498db'; // Jardineira Jeans
            ctx.fillRect(jtX - 8, jtY - 4, 16, 16);
            ctx.fillStyle = '#ffdbac'; // Pele
            ctx.fillRect(jtX - 6, jtY - 14, 12, 10);
            ctx.fillStyle = '#e67e22'; // Cabelo/Chapéu
            ctx.fillRect(jtX - 10, jtY - 17, 20, 4);

            // Ferramenta na mão visualmente ativa
            ctx.fillStyle = '#bdc3c7';
            ctx.fillRect(jtX + 6, jtY, 4, 8);

            // 3. ILUMINAÇÃO DINÂMICA (Efeito Avançado de Ciclo Dia/Noite)
            // Filtro de cor por cima do Canvas dependendo do horário
            let filtroAlfa = 0;
            let filtroCor = "10, 10, 50"; // Tom azul escuro de noite

            if (tempo.hora >= 18 && tempo.hora < 20) { // Entardecer
                filtroAlfa = 0.25; filtroCor = "230, 126, 34"; // Laranja
            } else if (tempo.hora >= 20 || tempo.hora < 4) { // Noite Escura
                filtroAlfa = 0.55; // Escurece bastante
            } else if (tempo.hora >= 4 && tempo.hora < 6) { // Alvorecer
                filtroAlfa = 0.2; filtroCor = "155, 89, 182"; // Roxo sutil
            }

            if (filtroAlfa > 0) {
                ctx.fillStyle = `rgba(${filtroCor}, ${filtroAlfa})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // 4. PROCESSAR E RENDERIZAR TEXTOS FLUTUANTES
            for (let k = textosFlutuantes.length - 1; k >= 0; k--) {
                let t = textosFlutuantes[k];
                ctx.fillStyle = t.cor || '#ffffff';
                ctx.font = "bold 22px 'VT323'";
                ctx.fillText(t.txt, t.x - cameraX, t.y - cameraY);
                t.y += t.yVel;
                t.alfa -= 0.02;
                if (t.alfa <= 0) textosFlutuantes.splice(k, 1);
            }

            requestAnimationFrame(loopPrincipal);
        }

        function checarFimDeJogo() {
            if (saudeSolo <= 0) {
                jogoAtivo = false;
                document.getElementById('mensagem').innerText = "🚨 O solo do Vale desertificou por excesso de químicos. Fim de jogo! 🥀";
            } else if (moedas >= 500) {
                jogoAtivo = false;
                const msg = document.getElementById('mensagem');
                msg.style.color = '#5aff5a';
                msg.innerText = "🏆 Lendário! Você alcançou o topo da economia agrícola sustentável do vale!";
            }
        }

        // Inicializar
        atualizarUI();
        loopPrincipal();
    </script>
</body>
</html>
